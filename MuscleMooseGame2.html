
<!DOCTYPE html>

  <!-- Intercept and hide the annoying Tailwind/Babel dev warnings -->

    console.warn = function(...args) {

      origWarn.apply(console, args);
    };
    const origLog = console.log;
    console.log = function(...args) {
      if (typeof args[0] === 'string' && args[0].includes('in-browser Babel transformer')) return;
      origLog.apply(console, args);
    };
  </script>

  <!-- Import Maps for ES Modules -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",

    .debug-scroll::-webkit-scrollbar { width: 6px; }

<body>
  <!-- Branded Splash Screen Overlay -->
  <div id="splash-screen" style="position: absolute; inset: 0; z-index: 9999; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease-out;">
      <img src="https://musclemoose.co.uk/wp-content/uploads/2020/11/logo.png" style="width: 160px; height: 160px; object-fit: contain; filter: drop-shadow(0 0 20px rgba(57,255,20,0.3)); animation: splashPulse 2s ease-in-out infinite;" alt="Muscle Moose" />
      <style>@keyframes splashPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }</style>
      <div style="position: absolute; bottom: 30px; color: rgba(255,255,255,0.4); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;">Made by Mr Smith</div>
  </div>

  <!-- React Mount Point -->
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect, useMemo, Suspense, Component } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Canvas, useFrame, useThree } from '@react-three/fiber';
    import { Sky } from '@react-three/drei';
    import * as THREE from 'three';
    import { Play, RotateCcw, Zap, CheckCircle2, AlertTriangle, Loader2, Bug, ChevronUp, ChevronDown, Terminal, Trophy, Flame, ShieldAlert, Activity, Camera, HelpCircle, Settings, X, Pause, Home, CloudRain, Music, Volume2, VolumeX, Gauge, Trash2, Map } from 'lucide-react';

    // --- Global Audio Singleton ---
    let globalAudio = null;

    // --- Global Arcade Characters ---
    const CHAR_SET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_! ".split("");

    // --- Error Boundary ---
    class ErrorBoundary extends Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { 
        console.error('React Error Boundary Caught:', error, errorInfo);
        this.setState({ errorInfo });
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="flex flex-col items-center justify-center h-full w-full bg-red-950 text-white p-6 absolute inset-0 z-50">
              <AlertTriangle className="w-16 h-16 text-red-500 mb-4" />
              <h1 className="text-3xl font-bold mb-2">Fatal Render Error</h1>
              <p className="text-gray-300 mb-6">The 3D engine encountered an unexpected exception.</p>
              <button onClick={() => window.location.reload()} className="mt-8 px-6 py-3 bg-red-600 hover:bg-red-500 rounded font-bold transition-colors">
                Reload Application
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- Game Constants ---
    const LANE_WIDTH = 2.0; 
    const BASE_SPEED = 25;
    const MAX_ENERGY = 100;
    const ENERGY_DRAIN_RATE = 5;
    const SPAWN_DISTANCE = -100;
    const DESPAWN_DISTANCE = 15;

    // --- Season Atmospheric Dictionary ---
    const SEASON_PROPS = {
      summer: { name: 'Summer', fog: '#87CEEB', turbidity: 0.1, rayleigh: 0.5, lightInt: 2.0, ambInt: 1.5, partType: 'dust' },
      autumn: { name: 'Autumn', fog: '#d99d62', turbidity: 6.0, rayleigh: 1.5, lightInt: 1.5, ambInt: 1.0, partType: 'leaves' },
      winter: { name: 'Winter', fog: '#b0c4de', turbidity: 15.0, rayleigh: 4.0, lightInt: 1.0, ambInt: 0.8, partType: 'snow' },
      spring: { name: 'Spring', fog: '#8ba0b5', turbidity: 4.0, rayleigh: 1.0, lightInt: 1.2, ambInt: 1.0, partType: 'rain' }
    };

    // --- Synchronized GPU/CPU Dynamic Terrain Engine ---
    const globalUniforms = {
        uDistance: { value: 0 },
        uTrackType: { value: 0.0 },       // Current interpolated value for smooth easing
        uTrackTypeTarget: { value: 0.0 }  // Absolute target mode (0.0 or 1.0)
    };

    const injectDynamicTerrain = (shader) => {
        shader.uniforms.uDistance = globalUniforms.uDistance;
        shader.uniforms.uTrackType = globalUniforms.uTrackType;
        shader.vertexShader = `
            uniform float uDistance;
            uniform float uTrackType;
            ${shader.vertexShader}
        `.replace(
            '#include <project_vertex>',
            `
            vec4 localPos = vec4( transformed, 1.0 );
            #ifdef USE_INSTANCING
                localPos = instanceMatrix * localPos;
            #endif
            
            vec4 worldPos = modelMatrix * localPos;
            
            float absZ = -worldPos.z + uDistance; 
            
            float curveX = sin(absZ * 0.002) * 40.0 + cos(absZ * 0.001) * 20.0;
            
            float chasm = 0.0;
            if (absZ > 2800.0 && absZ < 4200.0) {
                float t = (absZ - 2800.0) / 1400.0;
                chasm = sin(t * 3.14159) * -35.0; 
            }
            float hill = sin(absZ * 0.01) * 4.0;
            float curveY = chasm < 0.0 ? chasm : (hill + cos(worldPos.x * 0.5 + absZ * 0.05) * 0.5);

            worldPos.x += curveX * uTrackType;
            worldPos.y += curveY * uTrackType;

            float distToCam = abs(worldPos.z - 9.5);
            worldPos.y -= pow(distToCam, 2.0) * 0.0015;

            vec4 mvPosition = viewMatrix * worldPos;
            gl_Position = projectionMatrix * mvPosition;
            `
        );
    };

    const getTerrainOffset = (absoluteZ, originalX = 0) => {
        const curveX = Math.sin(absoluteZ * 0.002) * 40.0 + Math.cos(absoluteZ * 0.001) * 20.0;
        
        let chasm = 0;
        if (absoluteZ > 2800 && absoluteZ < 4200) {
            const t = (absoluteZ - 2800) / 1400;
            chasm = Math.sin(t * Math.PI) * -35.0;
        }
        const hill = Math.sin(absoluteZ * 0.01) * 4.0;
        const curveY = chasm < 0 ? chasm : (hill + Math.cos(originalX * 0.5 + absoluteZ * 0.05) * 0.5);
        
        const dx = 0.002 * 40.0 * Math.cos(absoluteZ * 0.002) - 0.001 * 20.0 * Math.sin(absoluteZ * 0.001);
        const rotY = -Math.atan(dx);
        
        let dy = 0;
        if (chasm < 0) {
            dy = (-35.0 * Math.PI / 1400) * Math.cos(((absoluteZ - 2800)/1400) * Math.PI);
        } else {
            dy = 0.01 * 4.0 * Math.cos(absoluteZ * 0.01);
        }
        const rotX = Math.atan(dy);

        const tType = globalUniforms.uTrackType.value;

        // Multiply by the animated scalar to smoothly unbend the CPU math precisely with the GPU
        return { 
            x: curveX * tType, 
            y: curveY * tType, 
            rotY: rotY * tType, 
            rotX: rotX * tType 
        };
    };

    // --- Asset URLs ---
    const RAW_ASSETS = {
      logo: "https://musclemoose.co.uk/wp-content/uploads/2020/11/logo.png",
      sourApple: "https://musclemoose.co.uk/wp-content/uploads/2020/09/MJ-Green-Apple-440ml-1024x1024-1.png",
      blueRasp: "https://musclemoose.co.uk/wp-content/uploads/2025/10/MJ-Blue-Rasp-440ml-1024x1024-1.png",
      berry: "https://musclemoose.co.uk/wp-content/uploads/2025/10/MJ-Berry-440ml-1024x1024-1.png",
      flapjack: "https://musclemoose.co.uk/wp-content/uploads/2019/09/Mixed-Berry-Protein-Flapjack.png",
      // Reliable public domain HTTPS stream to bypass Android's content:// relative path block
      musicBase: "https://raw.githubusercontent.com/asx2asc/Offline/refs/heads/main/Background.mp3"    };

    // --- GLOBAL PROCEDURAL ASSET FACTORIES ---

    // 1. DEER
    let deerSharedAssets = null;
    const initDeerAssets = () => {
        if (deerSharedAssets) return;
        
        const size = 512; 
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        const imgData = ctx.createImageData(size, size);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            const noise = Math.random();
            const color = noise > 0.5 ? 40 : 210;
            const alpha = noise > 0.2 ? 76 : 0; 
            data[i] = color; data[i+1] = color; data[i+2] = color; data[i+3] = alpha;
        }
        ctx.putImageData(imgData, 0, 0);

        ctx.globalAlpha = 0.5;
        for(let j = 1; j <= 5; j++) { ctx.drawImage(canvas, 0, j * 2); }
        ctx.globalAlpha = 1.0;

        const furTex = new THREE.CanvasTexture(canvas);
        furTex.wrapS = THREE.RepeatWrapping; furTex.wrapT = THREE.RepeatWrapping; furTex.repeat.set(4, 4);

        const mats = {
          body: new THREE.MeshStandardMaterial({ color: 0x6E4B33, roughness: 0.95, displacementMap: furTex, displacementScale: 0.08 }),
          chest: new THREE.MeshStandardMaterial({ color: 0x9c7f63, roughness: 0.95, displacementMap: furTex, displacementScale: 0.12 }),
          dark: new THREE.MeshStandardMaterial({ color: 0x2e1b12, roughness: 0.9, displacementMap: furTex, displacementScale: 0.05 }),
          nose: new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.4 }),
          eye: new THREE.MeshStandardMaterial({ color: 0x010101, roughness: 0.1, metalness: 0.8 }),
          hoof: new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.7 }),
          antler: new THREE.MeshStandardMaterial({ color: 0xc9b69b, roughness: 0.8, displacementMap: furTex, displacementScale: 0.02 })
        };
        const baseSphere = new THREE.SphereGeometry(1, 64, 64); 
        deerSharedAssets = { furTex, mats, baseSphere };
    };

    const createDeerInstance = () => {
        initDeerAssets();
        const { mats, baseSphere } = deerSharedAssets;
        
        const rootGroup = new THREE.Group();
        const legs =[];

        function createPart(parent, scaleX, scaleY, scaleZ, posX, posY, posZ, rotX = 0, rotY = 0, rotZ = 0, material = mats.body) {
            const mesh = new THREE.Mesh(baseSphere, material);
            mesh.scale.set(scaleX, scaleY, scaleZ); mesh.position.set(posX, posY, posZ); mesh.rotation.set(rotX, rotY, rotZ);
            mesh.castShadow = true; mesh.receiveShadow = true; parent.add(mesh);
            return mesh;
        }

        createPart(rootGroup, 0.9, 1.1, 2.0, 0, 4.0, 0);       
        createPart(rootGroup, 1.1, 1.4, 1.4, 0, 4.3, 1.5, 0, 0, 0, mats.chest);     
        createPart(rootGroup, 1.0, 1.2, 1.3, 0, 4.1, -1.4);    
        createPart(rootGroup, 0.35, 0.7, 0.35, 0, 4.5, -2.4, -Math.PI / 2.5, 0, 0, mats.chest);

        const headGroup = new THREE.Group();
        headGroup.position.set(0, 5.5, 1.5); rootGroup.add(headGroup);

        createPart(headGroup, 0.5, 1.8, 0.7, 0, 0.3, 0.7, Math.PI / 6, 0, 0); 
        createPart(headGroup, 0.6, 0.7, 1.0, 0, 1.7, 1.3, -Math.PI / 12, 0, 0); 
        
        const snout = createPart(headGroup, 0.35, 0.4, 1.2, 0, 1.4, 2.1, -Math.PI / 8, 0, 0, mats.dark); 
        const nose = new THREE.Mesh(baseSphere, mats.nose);
        nose.scale.set(0.16 / 0.35, 0.14 / 0.4, 0.15 / 1.2); nose.position.set(0, 0.15, 0.98); nose.castShadow = true; snout.add(nose); 

        createPart(headGroup, 0.12, 0.12, 0.12,  0.48, 1.85, 1.75, 0, -Math.PI/8, 0, mats.eye); 
        createPart(headGroup, 0.12, 0.12, 0.12, -0.48, 1.85, 1.75, 0,  Math.PI/8, 0, mats.eye); 
        createPart(headGroup, 0.15, 0.6, 0.2, 0.5, 2.1, 0.9, Math.PI/4, 0, -Math.PI/4); 
        createPart(headGroup, 0.15, 0.6, 0.2, -0.5, 2.1, 0.9, Math.PI/4, 0, Math.PI/4); 

        function createLeg(x, pivotY, pivotZ, isFront) {
            const upperLegGroup = new THREE.Group();
            upperLegGroup.position.set(x, pivotY, pivotZ); rootGroup.add(upperLegGroup);

            const kneeY = isFront ? -1.5 : -1.6; const kneeZ = isFront ? 0.2 : 0.1;
            const lowerLegGroup = new THREE.Group();
            lowerLegGroup.position.set(0, kneeY, kneeZ); upperLegGroup.add(lowerLegGroup);
            legs.push({ upper: upperLegGroup, lower: lowerLegGroup, isFront });

            const upperY = isFront ? 3.0 : 3.2;
            createPart(upperLegGroup, isFront ? 0.35 : 0.42, isFront ? 1.5 : 1.6, isFront ? 0.52 : 0.63, 0, (upperY - pivotY), 0, isFront ? Math.PI/16 : -Math.PI/12);
            const lowerY = 1.0; const lowerZ = isFront ? 1.5 : -1.6;
            createPart(lowerLegGroup, 0.15, 1.8, 0.15, 0, (lowerY - pivotY) - kneeY, (lowerZ - pivotZ) - kneeZ, isFront ? 0 : Math.PI/24, 0, 0, mats.dark);
            const hoofY = -0.5; const hoofZ = isFront ? 1.55 : -1.55;
            createPart(lowerLegGroup, 0.2, 0.2, 0.25, 0, (hoofY - pivotY) - kneeY, (hoofZ - pivotZ) - kneeZ, 0, 0, 0, mats.hoof);
        }

        createLeg(0.6, 3.7, 1.5, true);   createLeg(-0.6, 3.7, 1.5, true);  
        createLeg(0.6, 3.7, -1.3, false); createLeg(-0.6, 3.7, -1.3, false);

        function createAntler(isLeft) {
            const sign = isLeft ? 1 : -1;
            const curves =[
                new THREE.CatmullRomCurve3([new THREE.Vector3(sign*0.3, 7.5, 2.5), new THREE.Vector3(sign*0.8, 8.5, 2.2), new THREE.Vector3(sign*1.5, 9.5, 1.8), new THREE.Vector3(sign*2.0, 10.5, 2.0), new THREE.Vector3(sign*1.8, 11.5, 2.5)]),
                new THREE.CatmullRomCurve3([new THREE.Vector3(sign*0.5, 7.8, 2.4), new THREE.Vector3(sign*0.6, 8.5, 3.2), new THREE.Vector3(sign*0.4, 9.0, 3.8)]),
                new THREE.CatmullRomCurve3([new THREE.Vector3(sign*1.2, 9.0, 2.0), new THREE.Vector3(sign*1.6, 9.8, 2.8), new THREE.Vector3(sign*1.5, 10.5, 3.5)]),
                new THREE.CatmullRomCurve3([new THREE.Vector3(sign*1.8, 10.0, 1.9), new THREE.Vector3(sign*2.4, 10.5, 1.5), new THREE.Vector3(sign*2.6, 11.2, 1.2)])
            ];
            curves.forEach(curve => {
                curve.points.forEach(p => { p.y -= 5.5; p.z -= 1.5; });
                const geo = new THREE.TubeGeometry(curve, 32, 0.08, 8, false);
                const mesh = new THREE.Mesh(geo, mats.antler);
                mesh.castShadow = true; headGroup.add(mesh);
            });
        }
        createAntler(true); createAntler(false);

        rootGroup.position.y = 0.5;
        return { root: rootGroup, legs, headGroup };
    };

    // 2. HIGH POLYGON CANS
    let canSharedAssets = null;
    const initCanAssets = () => {
        if (canSharedAssets) return;
        canSharedAssets = {
            mainBody: new THREE.CylinderGeometry(0.35, 0.35, 1.0, 128, 32),
            topTaper: new THREE.CylinderGeometry(0.31, 0.35, 0.1, 128, 16),
            topRim: new THREE.TorusGeometry(0.31, 0.015, 32, 128),
            topCap: new THREE.CylinderGeometry(0.30, 0.30, 0.01, 64),
            bottomTaper: new THREE.CylinderGeometry(0.32, 0.35, 0.1, 128, 16),
            bottomRim: new THREE.TorusGeometry(0.32, 0.015, 32, 128)
        };
    };

    // 3. HIGH POLYGON FLAPJACKS
    let flapjackSharedAssets = null;
    const initFlapjackAssets = () => {
        if (flapjackSharedAssets) return;
        const mainGeo = new THREE.BoxGeometry(1.2, 0.15, 0.75, 64, 8, 64);
        const pos = mainGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i); const y = pos.getY(i); const z = pos.getZ(i);
            if (y > 0) { 
                const noise = (Math.sin(x * 15) * Math.cos(z * 15)) * 0.015;
                const bulge = Math.cos(x * 2.5) * Math.cos(z * 4) * 0.02;
                pos.setY(i, y + noise + bulge);
            }
        }
        mainGeo.computeVertexNormals();

        const rightCrimpGeo = new THREE.BoxGeometry(0.08, 0.02, 0.65, 16, 2, 64);
        const rPos = rightCrimpGeo.attributes.position;
        for (let i = 0; i < rPos.count; i++) { const x = rPos.getX(i); const z = rPos.getZ(i); rPos.setX(i, x + Math.sin(z * 80) * 0.02); }
        rightCrimpGeo.computeVertexNormals();

        const leftCrimpGeo = new THREE.BoxGeometry(0.08, 0.02, 0.65, 16, 2, 64);
        const lPos = leftCrimpGeo.attributes.position;
        for (let i = 0; i < lPos.count; i++) { const x = lPos.getX(i); const z = lPos.getZ(i); lPos.setX(i, x + Math.sin(z * 80) * 0.02); }
        leftCrimpGeo.computeVertexNormals();

        flapjackSharedAssets = { mainGeo, rightCrimpGeo, leftCrimpGeo };
    };

    // 4. HIGH POLYGON TNT CRATE
    let tntSharedAssets = null;
    const initTntAssets = () => {
        if (tntSharedAssets) return;
        
        const res = 512;
        const canvas = document.createElement("canvas"); const ctx = canvas.getContext("2d"); canvas.width = res; canvas.height = res;
        const bumpCanvas = document.createElement("canvas"); const bCtx = bumpCanvas.getContext("2d"); bumpCanvas.width = res; bumpCanvas.height = res;

        ctx.fillStyle = "#8b1a1a"; ctx.fillRect(0, 0, res, res);
        bCtx.fillStyle = "#888888"; bCtx.fillRect(0, 0, res, res);
        ctx.lineWidth = 4; bCtx.lineWidth = 4;
        
        for(let i=0; i<350; i++) {
            const isHorizontal = Math.random() > 0.5; const offset = Math.random() * res;
            ctx.beginPath(); bCtx.beginPath();
            if (isHorizontal) {
                ctx.moveTo(0, offset); bCtx.moveTo(0, offset);
                let curY = offset;
                for(let x=0; x<=res; x+=15) { curY += (Math.random()-0.5)*4; ctx.lineTo(x, curY); bCtx.lineTo(x, curY); }
            } else {
                ctx.moveTo(offset, 0); bCtx.moveTo(offset, 0);
                let curX = offset;
                for(let y=0; y<=res; y+=15) { curX += (Math.random()-0.5)*4; ctx.lineTo(curX, y); bCtx.lineTo(curX, y); }
            }
            ctx.strokeStyle = Math.random() > 0.5 ? "rgba(74, 13, 13, 0.7)" : "rgba(176, 37, 37, 0.5)";
            bCtx.strokeStyle = Math.random() > 0.5 ? "rgba(50,50,50,0.8)" : "rgba(180,180,180,0.8)";
            ctx.stroke(); bCtx.stroke();
        }

        ctx.lineWidth = 10; bCtx.lineWidth = 10; ctx.strokeStyle = "#3a0606"; bCtx.strokeStyle = "#111111"; 
        for (let i = 1; i <= 3; i++) {
            ctx.beginPath(); bCtx.beginPath(); ctx.moveTo(0, i * (res/4)); ctx.lineTo(res, i * (res/4)); ctx.stroke(); bCtx.stroke();
            ctx.beginPath(); bCtx.beginPath(); ctx.moveTo(i * (res/4), 0); ctx.lineTo(i * (res/4), res); ctx.stroke(); bCtx.stroke();
        }

        const woodTex = new THREE.CanvasTexture(canvas); woodTex.wrapS = woodTex.wrapT = THREE.RepeatWrapping; woodTex.colorSpace = THREE.SRGBColorSpace;
        const woodBump = new THREE.CanvasTexture(bumpCanvas); woodBump.wrapS = woodBump.wrapT = THREE.RepeatWrapping;

        const crateGeo = new THREE.BoxGeometry(1.4, 1.4, 1.4, 64, 64, 64);
        const pos = crateGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i); let y = pos.getY(i); let z = pos.getZ(i);
            const dent = (Math.sin(x*30)*Math.sin(y*30)*Math.sin(z*30)) * 0.008;
            const bowAmt = 0.04;
            const bowX = (Math.abs(x) > 0.69) ? 0 : Math.cos(y*2.5)*Math.cos(z*2.5)*bowAmt;
            const bowY = (Math.abs(y) > 0.69) ? 0 : Math.cos(x*2.5)*Math.cos(z*2.5)*bowAmt;
            const bowZ = (Math.abs(z) > 0.69) ? 0 : Math.cos(x*2.5)*Math.cos(y*2.5)*bowAmt;
            pos.setXYZ(i, x + dent - bowX*Math.sign(x), y + dent - bowY*Math.sign(y), z + dent - bowZ*Math.sign(z));
        }
        crateGeo.computeVertexNormals();

        const strapGeo = new THREE.BoxGeometry(1.45, 0.2, 1.45, 32, 4, 32);
        const sPos = strapGeo.attributes.position;
        for (let i = 0; i < sPos.count; i++) {
             let x = sPos.getX(i); let y = sPos.getY(i); let z = sPos.getZ(i);
             const dent = (Math.sin(x*50)*Math.cos(z*50)*Math.sin(y*50)) * 0.006;
             sPos.setXYZ(i, x + dent*Math.sign(x), y + dent*Math.sign(y), z + dent*Math.sign(z));
        }
        strapGeo.computeVertexNormals();

        tCtx.fillStyle = "#000000";
        tCtx.textAlign = "center";
        tCtx.textBaseline = "middle";
        tCtx.fillText("TNT", 256, 128);
        const textTex = new THREE.CanvasTexture(textCanvas);
        textTex.colorSpace = THREE.SRGBColorSpace;

        tntSharedAssets = { woodTex, woodBump, crateGeo, strapGeo, rivetGeo, textTex };

    // 5. PROCEDURAL HIGH POLY WEATHER ASSETS
    let weatherSharedAssets = null;
    const initWeatherAssets = () => {
        if (weatherSharedAssets) return;
        
        const cloudGeo = new THREE.SphereGeometry(6, 64, 64);
        const cPos = cloudGeo.attributes.position; const cNorm = cloudGeo.attributes.normal;
        for (let i = 0; i < cPos.count; i++) {
            const x = cPos.getX(i); const y = cPos.getY(i); const z = cPos.getZ(i);
            const nx = cNorm.getX(i); const ny = cNorm.getY(i); const nz = cNorm.getZ(i);
            const noise = Math.max(0, Math.sin(x*0.8) * Math.cos(z*0.8) * 2.5 + Math.sin(y*1.5) * 1.0);
            let finalY = y + ny * noise;
            if (finalY < -1.5) finalY = -1.5 + (finalY + 1.5) * 0.15;
            cPos.setXYZ(i, x + nx * noise, finalY, z + nz * noise);
        }
        cloudGeo.computeVertexNormals();

        const leafGeo = new THREE.PlaneGeometry(0.8, 1.2, 16, 16);
        const lPos = leafGeo.attributes.position;
        for (let i = 0; i < lPos.count; i++) {
            const x = lPos.getX(i); const y = lPos.getY(i);
            lPos.setZ(i, Math.sin(x*8)*0.25 + Math.cos(y*5)*0.25);
        }
        leafGeo.computeVertexNormals();
        const leafMat = new THREE.MeshStandardMaterial({ color: "#d95c14", roughness: 0.9, side: THREE.DoubleSide });

        const snowGeo = new THREE.IcosahedronGeometry(0.25, 3);
        const snowMat = new THREE.MeshStandardMaterial({ color: "#ffffff", emissive: "#ffffff", emissiveIntensity: 0.3, roughness: 0.5, transparent: true, opacity: 0.95 });

        const rainGeo = new THREE.ConeGeometry(0.05, 2.5, 16, 8);
        const rainMat = new THREE.MeshStandardMaterial({ color: "#a5c9eb", emissive: "#8eb6d9", emissiveIntensity: 0.6, roughness: 0.1, transparent: true, opacity: 0.8 });

        const dustGeo = new THREE.IcosahedronGeometry(0.12, 2);
        const dustMat = new THREE.MeshStandardMaterial({ color: "#ffd700", emissive: "#ffaa00", emissiveIntensity: 0.8, roughness: 0.2, transparent: true, opacity: 0.85 });

        weatherSharedAssets = { cloudGeo, leafGeo, leafMat, snowGeo, snowMat, rainGeo, rainMat, dustGeo, dustMat };
    };

    // 6. HIGH POLYGON TOXIC ACID PITS
    let acidPitAssets = null;
    const initAcidPitAssets = () => {
        if (acidPitAssets) return;

        const res = 2048;
        const cvs = document.createElement("canvas"); cvs.width = res; cvs.height = res;
        const ctx = cvs.getContext("2d");
        const bCvs = document.createElement("canvas"); bCvs.width = res; bCvs.height = res;
        const bCtx = bCvs.getContext("2d");
        
        ctx.fillStyle = "#3E2723"; ctx.fillRect(0, 0, res, res);
        bCtx.fillStyle = "#888888"; bCtx.fillRect(0, 0, res, res);
        ctx.lineWidth = 4; bCtx.lineWidth = 4;
        
        for(let i=0; i<3500; i++) {
            const offset = Math.random() * res;
            ctx.beginPath(); bCtx.beginPath();
            ctx.moveTo(offset, 0); bCtx.moveTo(offset, 0);
            let curX = offset;
            for(let y=0; y<=res; y+=15) { 
                curX += (Math.random()-0.5)*5; 
                ctx.lineTo(curX, y); bCtx.lineTo(curX, y); 
            }
            ctx.strokeStyle = Math.random() > 0.5 ? "rgba(46, 27, 18, 0.85)" : "rgba(92, 64, 51, 0.7)";
            bCtx.strokeStyle = Math.random() > 0.5 ? "rgba(40,40,40,0.95)" : "rgba(200,200,200,0.95)";
            ctx.stroke(); bCtx.stroke();
        }
        const splinterTex = new THREE.CanvasTexture(cvs); splinterTex.colorSpace = THREE.SRGBColorSpace; splinterTex.anisotropy = 16;
        const splinterBump = new THREE.CanvasTexture(bCvs); splinterBump.anisotropy = 16;

        const plankGeo = new THREE.BoxGeometry(0.25, 1.5, 0.08, 16, 64, 4);
        const pPos = plankGeo.attributes.position;
        for (let i = 0; i < pPos.count; i++) {
            let x = pPos.getX(i); let y = pPos.getY(i); let z = pPos.getZ(i);
            if (y > 0) {
                const tear = (Math.sin(x * 60) * Math.cos(y * 50) + Math.sin(x * 120 + y * 80) * 0.5) * (y * 0.25);
                const splinter = (Math.random() - 0.5) * (y * 0.15);
                x += tear; y += splinter; z += (Math.sin(y * 30) * 0.05);
            }
            pPos.setXYZ(i, x, y, z);
        }
        plankGeo.computeVertexNormals();

        const moundGeo = new THREE.CylinderGeometry(1.2, 2.2, 0.5, 64, 8, true);
        const mPos = moundGeo.attributes.position;
        for(let i=0; i<mPos.count; i++) {
            const x = mPos.getX(i); const y = mPos.getY(i); const z = mPos.getZ(i);
            const angle = Math.atan2(z, x);
            const noise = (Math.sin(angle * 40) * 0.05) + (Math.cos(y * 10) * 0.05);
            mPos.setXYZ(i, x * (1 + noise), y, z * (1 + noise));
        }
        moundGeo.computeVertexNormals();

        const funnelGeo = new THREE.CylinderGeometry(1.2, 0.8, 0.6, 128, 16, true);
        const fPos = funnelGeo.attributes.position;
        for(let i=0; i<fPos.count; i++) {
            const x = fPos.getX(i); const y = fPos.getY(i); const z = fPos.getZ(i);
            const angle = Math.atan2(z, x);
            const noise = (Math.sin(angle * 32) * 0.08) + (Math.cos(y * 20 + angle * 16) * 0.05);
            fPos.setXYZ(i, x * (1 + noise), y, z * (1 + noise));
        }
        funnelGeo.computeVertexNormals();

        const liquidGeo = new THREE.CircleGeometry(0.9, 128);
        const lPos = liquidGeo.attributes.position;
        for(let i=0; i<lPos.count; i++) {
            const x = lPos.getX(i); const y = lPos.getY(i);
            const z = (Math.sin(x*20) * Math.cos(y*20) * 0.1) + (Math.sin(x*45 + y*45) * 0.04); 
            lPos.setZ(i, z);
        }
        liquidGeo.computeVertexNormals();

        acidPitAssets = { splinterTex, splinterBump, plankGeo, funnelGeo, moundGeo, liquidGeo };
    };

    const BiomeController = ({ stateRef, envProps }) => {
        const { scene } = useThree();
        const targetColor = useRef(new THREE.Color(envProps.fog));
        const currentColor = useRef(new THREE.Color(envProps.fog));

        useFrame(() => {
            const dist = stateRef.current?.distance || 0;
            if (dist < 2000) targetColor.current.set(envProps.fog); 
            else if (dist < 4000) targetColor.current.set('#1A237E'); 
            else if (dist < 6000) targetColor.current.set('#FF3D00'); 
            else targetColor.current.set('#000000'); 

            currentColor.current.lerp(targetColor.current, 0.01);
            if (scene.fog) scene.fog.color.copy(currentColor.current);
            scene.background = currentColor.current;
        });
        return null;
    };

    const ZiplineWire = ({ stateRef }) => {
        const wireRef = useRef(null);
        useFrame(() => {

            }

        return (
            <group ref={wireRef} position={[0, 4.3, -50]} visible={false}>

    // --- 3D Components ---
    const WeatherSystem = ({ season, speedRef, gameState }) => {
        initWeatherAssets();
        const meshRef = useRef(null); const cloudRef = useRef(null);
        const { camera } = useThree();
        const count = 1500; const cloudCount = 40;

        const particles = useMemo(() => {
            return Array.from({ length: count }).map(() => ({
                x: (Math.random() - 0.5) * 60, y: Math.random() * 60, z: (Math.random() - 0.5) * 100 - 30,
                vx: (Math.random() - 0.5) * 0.1, vy: -Math.random() * 0.2 - 0.1, vz: (Math.random() - 0.5) * 0.1,
                rx: Math.random() * Math.PI, ry: Math.random() * Math.PI, rz: Math.random() * Math.PI,
                rvx: (Math.random() - 0.5) * 0.05, rvy: (Math.random() - 0.5) * 0.05, scale: Math.random() * 0.5 + 0.5
            }));
        },[]);

        const clouds = useMemo(() => {
            return Array.from({ length: cloudCount }).map(() => ({
                x: (Math.random() - 0.5) * 350, y: Math.random() * 30 + 80, z: (Math.random() - 0.5) * 400 - 150,
                scale: Math.random() * 3.5 + 2.5, rotY: Math.random() * Math.PI * 2
            }));
        },[]);

        const dummy = useMemo(() => new THREE.Object3D(),[]);

        useFrame((state, delta) => {
            if (gameState === "paused") return;
            const safeDelta = Math.min(delta, 0.1);
            const moveZ = speedRef.current * safeDelta;
            const time = state.clock.elapsedTime;
            const camX = camera.position.x;

            if (cloudRef.current) {
                clouds.forEach((c, i) => {
                    c.z += moveZ * 0.1; if (c.z > 50) c.z -= 450;
                    dummy.position.set(camX + c.x, c.y, c.z); dummy.rotation.set(0, c.rotY, 0); dummy.scale.setScalar(c.scale);
                    dummy.updateMatrix(); cloudRef.current.setMatrixAt(i, dummy.matrix);
                });
                cloudRef.current.instanceMatrix.needsUpdate = true;
            }

            if (meshRef.current) {
                const isRain = season === 'spring'; const isSnow = season === 'winter';
                const isLeaves = season === 'autumn'; const isDust = season === 'summer';

                particles.forEach((p, i) => {
                    p.z += moveZ;
                    if (isRain) { p.y -= 40 * safeDelta; dummy.rotation.set(0, 0, 0); } 
                    else if (isSnow) { p.y -= 8 * safeDelta; p.x += Math.sin(time + i) * 0.08; dummy.rotation.set(p.rx, p.ry, p.rz); } 
                    else if (isLeaves) { p.y -= 5 * safeDelta; p.x += Math.cos(time * 0.5 + i) * 0.12; p.rx += p.rvx; p.ry += p.rvy; dummy.rotation.set(p.rx, p.ry, p.rz); } 
                    else if (isDust) { p.y -= 0.5 * safeDelta; p.x += Math.sin(time * 0.2 + i) * 0.03; dummy.rotation.set(p.rx, p.ry, p.rz); }

                    if (p.y < -20) { p.y = 60; p.x = (Math.random() - 0.5) * 60; p.z = (Math.random() - 0.5) * 100 - 30; }
                    if (p.z > 20) p.z -= 100;

                    dummy.position.set(camX + p.x, p.y, p.z); dummy.scale.setScalar(p.scale);
                    dummy.updateMatrix(); meshRef.current.setMatrixAt(i, dummy.matrix);
                });
                meshRef.current.instanceMatrix.needsUpdate = true;
            }
        });

        const activeGeo = season === 'autumn' ? weatherSharedAssets.leafGeo : season === 'winter' ? weatherSharedAssets.snowGeo : season === 'spring' ? weatherSharedAssets.rainGeo : weatherSharedAssets.dustGeo;
        const activeMat = season === 'autumn' ? weatherSharedAssets.leafMat : season === 'winter' ? weatherSharedAssets.snowMat : season === 'spring' ? weatherSharedAssets.rainMat : weatherSharedAssets.dustMat;

        return (
            <group>
                <instancedMesh ref={cloudRef} args={[weatherSharedAssets.cloudGeo, null, cloudCount]} receiveShadow frustumCulled={false}>
                    <meshStandardMaterial color="#ffffff" emissive="#aaddff" emissiveIntensity={0.15} roughness={0.9} transparent={true} opacity={0.95} flatShading={false} />
                </instancedMesh>
                <instancedMesh ref={meshRef} args={[activeGeo, activeMat, count]} receiveShadow castShadow={season === 'autumn'} frustumCulled={false} />
            </group>
        );
    };

    const Player = ({ speedRef, locomotion = 'run', stateRef, gameState }) => {
      const { root, legs, headGroup } = useMemo(() => createDeerInstance(),[]);

      useFrame((state, delta) => {
        if (root && legs.length === 4) {
          if (gameState === 'gameover' || gameState === 'name_entry' || stateRef?.current?.isDead) {
              if (stateRef?.current?.deathType === 'pit') {
                  root.rotation.x -= 10 * delta; 
                  root.rotation.y += 5 * delta;  
                  
                  const panic = state.clock.elapsedTime * 20;
                  legs.forEach((leg, i) => {
                      leg.upper.rotation.x = Math.sin(panic + i);
                      leg.lower.rotation.x = Math.cos(panic + i);
                  });
              } else {
                  root.rotation.x = THREE.MathUtils.lerp(root.rotation.x, Math.PI / 2.5, 5 * delta); 
                  if (headGroup) headGroup.rotation.x = THREE.MathUtils.lerp(headGroup.rotation.x, -Math.PI / 4, 5 * delta);
              }
              return; 
          }

          if (stateRef?.current?.isJumping) {
              legs.forEach((leg) => {
                  leg.upper.rotation.x = THREE.MathUtils.lerp(leg.upper.rotation.x, leg.isFront ? -0.6 : 0.5, 12 * delta);
                  leg.lower.rotation.x = THREE.MathUtils.lerp(leg.lower.rotation.x, leg.isFront ? 1.2 : -1.0, 12 * delta);
              });
              root.rotation.x = THREE.MathUtils.lerp(root.rotation.x, -0.2, 10 * delta); 
              if (headGroup) headGroup.rotation.x = THREE.MathUtils.lerp(headGroup.rotation.x, 0.3, 10 * delta);
              return; 
          }

          const isStumbling = stateRef?.current?.shakeTime > 0;
          if (isStumbling && !stateRef?.current?.isDead) {
              const shakeT = state.clock.elapsedTime * 12; 
              const intensity = stateRef.current.shakeTime / 0.5; 
              legs.forEach((leg, i) => {
                  leg.upper.rotation.x = Math.sin(shakeT + i) * (0.9 * intensity);
                  leg.lower.rotation.x = Math.abs(Math.cos(shakeT + i)) * (0.6 * intensity);
              });
              root.rotation.x = THREE.MathUtils.lerp(root.rotation.x, -0.5 * intensity, 10 * delta); 
              if (headGroup) headGroup.rotation.x = Math.sin(shakeT) * (0.4 * intensity);
              return;
          }

          if (stateRef?.current?.isZiplining) {
              const targetPitch = Math.PI / 4;
              root.rotation.x = THREE.MathUtils.lerp(root.rotation.x, targetPitch, 10 * delta); 
              
              const sway = Math.sin(state.clock.elapsedTime * 4) * 0.1;
              
              legs[0].upper.rotation.x = THREE.MathUtils.lerp(legs[0].upper.rotation.x, Math.PI / 1.8 + sway, 10 * delta);
              legs[0].lower.rotation.x = THREE.MathUtils.lerp(legs[0].lower.rotation.x, -0.2 - sway, 10 * delta);
              legs[1].upper.rotation.x = THREE.MathUtils.lerp(legs[1].upper.rotation.x, Math.PI / 1.8 + sway, 10 * delta);
              legs[1].lower.rotation.x = THREE.MathUtils.lerp(legs[1].lower.rotation.x, -0.2 - sway, 10 * delta);
              
              legs[2].upper.rotation.x = THREE.MathUtils.lerp(legs[2].upper.rotation.x, -0.3 + sway, 10 * delta);
              legs[2].lower.rotation.x = THREE.MathUtils.lerp(legs[2].lower.rotation.x, -0.1, 10 * delta);
              legs[3].upper.rotation.x = THREE.MathUtils.lerp(legs[3].upper.rotation.x, -0.3 + sway, 10 * delta);
              legs[3].lower.rotation.x = THREE.MathUtils.lerp(legs[3].lower.rotation.x, -0.1, 10 * delta);
              
              if (headGroup) headGroup.rotation.x = THREE.MathUtils.lerp(headGroup.rotation.x, -0.2, 10 * delta);
              return; 
          }
          
          root.rotation.x = THREE.MathUtils.lerp(root.rotation.x, 0, 10 * delta); 
          const runSpeed = (speedRef?.current || BASE_SPEED) * 0.6;
          const t = state.clock.elapsedTime * runSpeed;

          if (headGroup) headGroup.rotation.x = Math.cos(t * 2) * -0.15;

          if (locomotion === 'hop') {
            const hopSpeed = t * 0.75; 
            root.position.y = Math.pow(Math.sin(hopSpeed), 2) * 0.35; 
            root.rotation.x = Math.cos(hopSpeed) * 0.15; 
            
            legs.forEach((leg, i) => {
              const asymmetry = (i === 1 || i === 3) ? 0.2 : 0; 
              const phase = hopSpeed + asymmetry;
              const swing = Math.sin(phase); const lift = Math.max(0, Math.cos(phase));
              leg.upper.rotation.x = leg.isFront ? swing * 0.7 + 0.2 : -swing * 0.7 - 0.2;
              leg.lower.rotation.x = leg.isFront ? lift * 0.6 : -lift * 0.6;
            });
          } else {
            root.position.y = Math.pow(Math.sin(t * 2), 2) * 0.15; 
            root.rotation.x = Math.cos(t * 2) * 0.08; 
            root.rotation.z = Math.sin(t) * 0.05;    
            const offsets =[Math.PI, 0, Math.PI / 2, -Math.PI / 2]; 
            
            legs.forEach((leg, i) => {
              const phase = t + offsets[i];
              const swing = Math.sin(phase); 
              
              const lift = Math.max(0, Math.cos(phase));
              const groundClamp = lift === 0 ? 0.2 : 0; 
              
              leg.upper.rotation.x = swing * 0.6 + (leg.isFront ? 0.2 : -0.2);
              
              if (leg.isFront) { 
                  leg.lower.rotation.x = lift * 0.8 - groundClamp; 
              } else { 
                  leg.lower.rotation.x = -lift * 0.8 + groundClamp; 
              }
            });
          }
        }
      });

      return <primitive object={root} scale={0.28} rotation={[0, Math.PI, 0]} />;
    };

                <mesh castShadow position={[-0.64, 0, 0]} geometry={flapjackSharedAssets.leftCrimpGeo} frustumCulled={false}><meshStandardMaterial onBeforeCompile={injectDynamicTerrain} color={wrapperColor} roughness={0.4} metalness={0.3} /></mesh>

                <mesh position={[0, 0, 0.73]} frustumCulled={false}>

    const HighPolyPit = () => {

        return (
            <group>

                </mesh>
                <mesh position={[0, 0.2, 0]} geometry={acidPitAssets.funnelGeo} frustumCulled={false}>
                    <meshStandardMaterial side={THREE.BackSide} color="#050302" roughness={1.0} onBeforeCompile={injectDynamicTerrain} />
                </mesh>

    const GameLoop = ({ gameState, stateRef, speedRef, handleGameOver }) => {

            s.isDead = true; 
            s.deathType = "energy";

        if (s.distance - s.lastSpawnDistance > 15) {
          s.lastSpawnDistance = s.distance;
          const numItems = Math.random() > 0.4 ? 2 : 1;
          const availableLanes =[-1, 0, 1].sort(() => Math.random() - 0.5);

          for (let i = 0; i < numItems; i++) {

            let type = "sour-apple";
            if (rand > 0.9) type = "pit"; else if (rand > 0.75) type = "obstacle"; else if (rand > 0.6) type = "flapjack"; else if (rand > 0.45) type = "logo"; else if (rand > 0.3) type = "berry"; else if (rand > 0.15) type = "blue-rasp";
            s.items.push({ id: s.nextItemId++, x: lane * LANE_WIDTH, z: SPAWN_DISTANCE, type, collected: false });
          }
          changed = true;
        }

        const playerX = s.lane * LANE_WIDTH;

        for (let i = s.items.length - 1; i >= 0; i--) {

          item.z += moveDist;

                    else if (item.type === "flapjack") { s.score += 50 * streakMultiplier; s.energy = Math.min(MAX_ENERGY, s.energy + 25); } 
                    else { s.score += 20 * streakMultiplier; s.energy = Math.min(MAX_ENERGY, s.energy + 15); }

          }

          if (item.z > DESPAWN_DISTANCE || item.collected) { s.items.splice(i, 1); changed = true; }
        }

        if (changed) s.itemsChanged = true;

        s.isZiplining = (s.distance > 2800 && s.distance < 4200);

    const PlayerWrapper = ({ gameState, stateRef, speedRef, isZoomed, locomotion }) => {
      const playerRef = useRef(null); const { camera } = useThree(); const lookAtTarget = useRef(new THREE.Vector3(0, 2, -10));

          const targetZ = isZoomed ? 5.5 : 9.5; 
          const targetLookY = offset.y + (isZoomed ? 2.5 : 2.0) + altitudeOffset;

          const sinY = Math.sin(offset.rotY);
          const cosY = Math.cos(offset.rotY);
          
          // Pan camera laterally as path arcs
          const idealCamX = THREE.MathUtils.lerp(camera.position.x, offset.x + (s.lane * LANE_WIDTH * 0.4) + (targetZ * sinY), 6 * safeDelta);
          const idealCamY = THREE.MathUtils.lerp(camera.position.y, targetY, 5 * safeDelta);
          const idealCamZ = THREE.MathUtils.lerp(camera.position.z, targetZ * cosY, 5 * safeDelta);
          const idealLookY = THREE.MathUtils.lerp(lookAtTarget.current.y, targetLookY, 5 * safeDelta);

            dir: new THREE.Vector3((Math.random()-0.5)*2, Math.random()*2, (Math.random()-0.5)*2).normalize(),

            rot: new THREE.Vector3(Math.random(), Math.random(), Math.random()),

        useFrame((state, delta) => {

            if (data.age > 0.4) {
                const idx = stateRef.current.explosions.findIndex(e => e.id === data.id);
                if(idx > -1) stateRef.current.explosions.splice(idx, 1);
                return;
            }
            
            const scale = Math.max(0, 1 - (data.age / 0.4)); 
            particles.forEach((p, i) => {
                dummy.position.copy(p.dir).multiplyScalar(p.speed * data.age);
                dummy.rotation.x = p.rot.x + p.rotSpeed * data.age;
                dummy.rotation.y = p.rot.y + p.rotSpeed * data.age;
                dummy.rotation.z = p.rot.z + p.rotSpeed * data.age;

    function App() {
