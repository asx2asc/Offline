            if (!bgMusic.paused) { bgMusic.pause(); }
        }
      },[gameState, settings.musicEnabled, settings.musicVolume, isVisible]);

      const updateSetting = (key, value) => {
         setSettings(prev => {
            const next = { ...prev, [key]: value };
            try { localStorage.setItem('mm_settings', JSON.stringify(next)); } catch(e){}
            return next;
         });
      };

      const cycleSeason = () => {
          const seasons =['spring', 'summer', 'autumn', 'winter'];
          const next = seasons[(seasons.indexOf(settings.season) + 1) % seasons.length];
          updateSetting('season', next);
      };

      const stateRef = useRef({ lane: 0, y: 0, yVelocity: 0, isJumping: false, items:[], speed: BASE_SPEED, distance: 0, lastSpawnDistance: 0, nextItemId: 0, energy: MAX_ENERGY, score: 0, streak: 0, itemsChanged: false, explosions:[], shakeTime: 0, isDead: false, deathType: null, crashTimer: 0 });
      const speedRef = useRef(BASE_SPEED);

      const addLog = (level, message, detail = "") => {
        const time = new Date().toISOString().split('T')[1].slice(0, 8);
        setDebugLogs(prev =>[...prev, { time, level, message: `${message} ${detail}` }]);
      };

      useEffect(() => {
        let mounted = true;
        const textureLoader = new THREE.TextureLoader();
        
        const fetchAssetRobustly = async (key, originalUrl) => {
          const tryLoadImage = (url) => new Promise((resolve, reject) => {
              const img = new Image(); img.crossOrigin = "anonymous";
              img.onload = () => resolve(img); img.onerror = (e) => reject(new Error("Image failed to load network request"));
              img.src = url;
          });

          const strategies =[
            { name: 'WSRV Proxy', url: `https://wsrv.nl/?url=${encodeURIComponent(originalUrl)}&w=512&output=png` },
            { name: 'CorsProxy', url: `https://corsproxy.io/?url=${encodeURIComponent(originalUrl)}` },
            { name: 'Direct', url: originalUrl }
          ];

          let img = null;
          for (const strategy of strategies) {
              try { img = await tryLoadImage(strategy.url); addLog("success", `[${key}] Loaded via ${strategy.name}.`); break; } 
              catch (e) { addLog("warn", `[${key}] ${strategy.name} failed.`); }
          }

          if (!img) {
              addLog("error", `[${key}] All download strategies failed.`);
              const fallbackTex = await new Promise(r => textureLoader.load("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==", r));
              fallbackTex.colorSpace = THREE.SRGBColorSpace; return { success: false, texture: fallbackTex };
          }

          try {
              const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
              const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);

              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height); const data = imageData.data;
              let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;

              for (let y = 0; y < canvas.height; y++) {
                  for (let x = 0; x < canvas.width; x++) {
                      if (data[(y * canvas.width + x) * 4 + 3] > 10) {
                          if (x < minX) minX = x; if (x > maxX) maxX = x;
                          if (y < minY) minY = y; if (y > maxY) maxY = y;
                      }
                  }
              }
              const padding = 5;
              minX = Math.max(0, minX - padding); minY = Math.max(0, minY - padding); maxX = Math.min(canvas.width, maxX + padding); maxY = Math.min(canvas.height, maxY + padding);

              const finalCanvas = document.createElement('canvas');
              if (key === 'logo' || key === 'flapjack') {
                  finalCanvas.width = Math.max(1, maxX - minX); finalCanvas.height = Math.max(1, maxY - minY);
                  finalCanvas.getContext('2d').drawImage(canvas, minX, minY, finalCanvas.width, finalCanvas.height, 0, 0, finalCanvas.width, finalCanvas.height);
              } else {
                  const cropW = Math.max(1, maxX - minX); const cropH = Math.max(1, maxY - minY);
                  let maxCount = 0; let dominantColor = 'rgb(255,255,255)'; const colorCounts = {};

                  for (let y = minY; y < maxY; y++) {
                      for (let x = minX; x < maxX; x++) {
                          const i = (y * canvas.width + x) * 4;
                          if (data[i+3] > 200) { 
                              const r = Math.round(data[i] / 24) * 24; const g = Math.round(data[i+1] / 24) * 24; const b = Math.round(data[i+2] / 24) * 24;
                              if ((r>230 && g>230 && b>230) || (r<25 && g<25 && b<25)) continue;
                              const cKey = `${r},${g},${b}`; colorCounts[cKey] = (colorCounts[cKey] || 0) + 1;
                              if (colorCounts[cKey] > maxCount) { maxCount = colorCounts[cKey]; dominantColor = `rgb(${r},${g},${b})`; }
                          }
                      }
                  }
                  finalCanvas.width = cropW * 1.6; finalCanvas.height = cropH * 1.1;
                  const fCtx = finalCanvas.getContext('2d');
                  fCtx.fillStyle = dominantColor; fCtx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
                  fCtx.drawImage(canvas, minX, minY, cropW, cropH, (finalCanvas.width - cropW)/2, (finalCanvas.height - cropH)/2, cropW, cropH);
              }

              const texture = new THREE.CanvasTexture(finalCanvas);
              texture.colorSpace = THREE.SRGBColorSpace; texture.anisotropy = 16; texture.generateMipmaps = true; texture.minFilter = THREE.LinearMipmapLinearFilter;
              if (key === 'sourApple' || key === 'blueRasp' || key === 'berry') { texture.wrapS = THREE.RepeatWrapping; texture.repeat.set(2, 1); }
              return { success: true, texture };
          } catch (e) {
              addLog("error", `[${key}] Processing failed:`, e.message);
              const fallbackTex = await new Promise(r => textureLoader.load("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==", r));
              fallbackTex.colorSpace = THREE.SRGBColorSpace; return { success: false, texture: fallbackTex };
          }
        };

        const initializeAssets = async () => {
          const newAssets = {}; let anyFailed = false;
          await Promise.all(Object.entries(RAW_ASSETS).map(async ([k, v]) => {
            if (k === 'musicBase') return; 
            const result = await fetchAssetRobustly(k, v);
            newAssets[k] = result.texture; if (!result.success) anyFailed = true;
          }));

          initDeerAssets();
          initCanAssets();
          initFlapjackAssets();
          initTntAssets();
          initWeatherAssets();
          initAcidPitAssets();

          if (!mounted) return;
          setLoadedAssets(newAssets); 
          setAssetStatus(anyFailed ? "partial" : "verified");
        };

        initializeAssets();
        return () => { mounted = false; };
      },[]);

      const startGame = () => {
        const bgMusic = document.getElementById('native-bg-music');
        if (bgMusic) { 
            bgMusic.volume = (settings.musicVolume / 100) * 0.5; 
            if (settings.musicEnabled && !document.hidden) { 
                bgMusic.play().catch(e => addLog("warn", "Native audio play blocked:", e.message)); 
            } 
        }

        stateRef.current = { lane: 0, y: 0, yVelocity: 0, isJumping: false, items:[], speed: BASE_SPEED, distance: 0, lastSpawnDistance: 0, nextItemId: 0, energy: MAX_ENERGY, score: 0, streak: 0, itemsChanged: false, explosions:[], shakeTime: 0, isDead: false, deathType: null, crashTimer: 0 };
        speedRef.current = BASE_SPEED; setGameState("playing");
      };

      const handleGameOver = () => {
          const finalScore = Math.floor(stateRef.current.score);
          const isBoardNotFull = highScores.length < 5;
          const isBetterThanWorst = highScores.length > 0 && finalScore > highScores[highScores.length - 1].score;
          
          if (finalScore > 0 && (isBoardNotFull || isBetterThanWorst)) {
              setNameChars([0,0,0]);
              setActiveCharIdx(0);
              isTrapActive.current = false;
              setGameState("name_entry");
          } else {
              isTrapActive.current = false; 
              setGameState("gameover");
          }
      };

      useEffect(() => {
        const preventSpacebarScrollAndClick = (e) => { if (e.code === "Space" || e.key === " ") { e.preventDefault(); } };

        const handleKeyDown = (e) => {
          if (gameState === "name_entry") {
              if (e.key === "ArrowUp" || e.key === "w") setNameChars(prev => { const n=[...prev]; n[activeCharIdx] = (n[activeCharIdx] - 1 + CHAR_SET.length) % CHAR_SET.length; return n; });
              else if (e.key === "ArrowDown" || e.key === "s") setNameChars(prev => { const n=[...prev]; n[activeCharIdx] = (n[activeCharIdx] + 1 + CHAR_SET.length) % CHAR_SET.length; return n; });
              else if (e.key === "ArrowLeft" || e.key === "a") setActiveCharIdx(prev => Math.max(0, prev - 1));
              else if (e.key === "ArrowRight" || e.key === "d") setActiveCharIdx(prev => Math.min(2, prev + 1));
              else if (e.key === "Enter") document.getElementById("save-score-btn")?.click();
              return;
          }

          if (e.key === "Escape" && (gameState === "playing" || gameState === "paused") && stateRef.current.energy > 0 && !stateRef.current.isDead) {
              setGameState(prev => {
                  if (stateRef.current.energy <= 0) return "gameover";
                  if (prev === "playing") return "paused"; if (prev === "paused") return "playing";
              });
          }
          if (gameState !== "playing" || stateRef.current.isDead) return;
          if (e.key === "ArrowLeft" || e.key === "a") stateRef.current.lane = Math.max(-1, stateRef.current.lane - 1);
          else if (e.key === "ArrowRight" || e.key === "d") stateRef.current.lane = Math.min(1, stateRef.current.lane + 1);
          else if ((e.key === "ArrowUp" || e.key === "w" || e.key === " ") && !stateRef.current.isJumping && !stateRef.current.isZiplining) { stateRef.current.yVelocity = 20; stateRef.current.isJumping = true; }
        };
        
        window.addEventListener("keydown", preventSpacebarScrollAndClick, { capture: true });
        window.addEventListener("keydown", handleKeyDown);
        
        return () => { window.removeEventListener("keydown", preventSpacebarScrollAndClick, { capture: true }); window.removeEventListener("keydown", handleKeyDown); };
      },[gameState, activeCharIdx]); 

      const touchStartRef = useRef(null);
      const handleTouchStart = (e) => { if (e.touches && e.touches.length > 0) touchStartRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
      const handleTouchEnd = (e) => {
        if (!touchStartRef.current || gameState !== "playing" || stateRef.current.isDead || !e.changedTouches || e.changedTouches.length === 0) return;
        const touchEnd = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        const dx = touchEnd.x - touchStartRef.current.x; const dy = touchEnd.y - touchStartRef.current.y;
        if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
          if (Math.abs(dx) > Math.abs(dy)) stateRef.current.lane = dx > 0 ? Math.min(1, stateRef.current.lane + 1) : Math.max(-1, stateRef.current.lane - 1);
          else if (dy < 0 && !stateRef.current.isJumping && !stateRef.current.isZiplining) { stateRef.current.yVelocity = 20; stateRef.current.isJumping = true; }
        }
        touchStartRef.current = null;
      };

      const envProps = SEASON_PROPS[settings.season] || SEASON_PROPS.summer;

      return (
        <div className={`h-screen w-screen bg-neutral-950 flex flex-col font-sans text-white overflow-hidden select-none relative ${gameState === 'playing' ? 'touch-none' : ''}`} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
          
          <audio id="native-bg-music" src={RAW_ASSETS.musicBase} loop preload="auto" style={{ display: 'none' }} />

          {showDebug && (
            <div className="absolute top-0 right-0 w-full md:w-[450px] h-[50vh] md:h-screen bg-black/95 border-b md:border-l border-neutral-800 z-[70] flex flex-col shadow-2xl pointer-events-auto">
              <div className="flex items-center justify-between p-3 border-b border-neutral-800 bg-neutral-900">
                <div className="flex items-center gap-2 font-mono text-sm text-neutral-300"><Terminal className="w-4 h-4 text-[#39ff14]" /> Developer Debug Console</div>
                <button onClick={() => setShowDebug(false)} className="p-1 hover:bg-neutral-800 rounded"><ChevronUp className="w-5 h-5 md:hidden" /><span className="hidden md:block text-xs uppercase font-bold text-neutral-400 px-2">Close</span></button>
              </div>
              <div className="flex-1 overflow-y-auto p-4 debug-scroll font-mono text-xs flex flex-col gap-1.5 break-words whitespace-pre-wrap">
                {debugLogs.length === 0 && <span className="text-neutral-500">Awaiting logs...</span>}
                {debugLogs.map((log, i) => (
                  <div key={i} className="flex gap-2 leading-tight border-b border-neutral-900/50 pb-1 mb-1">
                    <span className="text-neutral-600 shrink-0">[{log.time}]</span>
                    <span className={`${log.level === 'error' ? 'text-red-400 font-bold' : ''} ${log.level === 'warn' ? 'text-yellow-400' : ''} ${log.level === 'success' ? 'text-green-400' : ''} ${log.level === 'info' ? 'text-blue-300' : ''}`}>{log.message}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {(gameState === "playing" || gameState === "paused") && !stateRef.current?.isDead && (
             <ScoreUI stateRef={stateRef} gameState={gameState} setGameState={setGameState} />
          )}

          <div className="flex-1 relative w-full bg-black">
            <ErrorBoundary>
              <Canvas shadows gl={{ stencil: true }} camera={{ position:[0, 4.5, 9.5], fov: 65 }}>
                <Suspense fallback={null}>
                  <SceneReadyNotifier assetStatus={assetStatus} />
                  
                  {assetStatus !== "verifying" && <PreWarmCache assets={loadedAssets} />}

                  <Sky sunPosition={[0, 1, -1]} turbidity={envProps.turbidity} rayleigh={envProps.rayleigh} />
                  <fog attach="fog" args={[envProps.fog, 20, 100]} />
                  <BiomeController stateRef={stateRef} envProps={envProps} />
                  <ambientLight intensity={envProps.ambInt} />
                  
                  <directionalLight position={[2, 25, 15]} intensity={envProps.lightInt} castShadow shadow-mapSize-width={2048} shadow-mapSize-height={2048} shadow-camera-left={-60} shadow-camera-right={60} shadow-camera-top={60} shadow-camera-bottom={-60} />

                  <Track speedRef={speedRef} gameState={gameState} />
                  <ZiplineWire stateRef={stateRef} />
                  <Scenery speedRef={speedRef} gameState={gameState} />
                  <WeatherSystem season={settings.season} speedRef={speedRef} gameState={gameState} />

                  {/* Persistently mount Player and Game Logic to allow dynamic GPU tracking across all UI states */}
                  <PlayerWrapper gameState={gameState} stateRef={stateRef} speedRef={speedRef} isZoomed={settings.zoom} locomotion={settings.locomotion} />
                  
                  {(gameState === "playing" || gameState === "paused") && (
                    <>
                      <ItemsManager stateRef={stateRef} assets={loadedAssets} />
                      <ExplosionManager stateRef={stateRef} />
                      <GameLoop gameState={gameState} stateRef={stateRef} speedRef={speedRef} handleGameOver={handleGameOver} />
                    </>
                  )}
                </Suspense>
              </Canvas>
            </ErrorBoundary>

            {gameState === "start" && (
              <div className="absolute inset-0 bg-black/60 backdrop-blur-sm z-20 overflow-y-auto overflow-x-hidden pointer-events-auto">
                <div className="flex flex-col items-center min-h-full w-full p-4 md:p-8 pt-12 pb-28">
                  <div className="flex flex-col items-center w-full max-w-md mb-8">
                    <img src={RAW_ASSETS.logo} alt="Muscle Moose" className="w-32 h-32 md:w-40 md:h-40 object-contain mb-2 drop-shadow-[0_0_30px_rgba(57,255,20,0.4)]" />
                    <h2 className="text-4xl md:text-6xl font-black italic text-white uppercase mb-6 drop-shadow-lg leading-tight text-center">Get Your <br className="md:hidden"/> Moose On!</h2>
                    <div className="flex items-center gap-3 mb-8 w-full justify-center">
                      <button onClick={() => setShowHelp(true)} className="flex items-center gap-2 px-4 py-2 bg-neutral-900/80 border border-neutral-700 hover:bg-neutral-800 rounded-full text-xs md:text-sm font-bold text-white uppercase tracking-wider transition-colors shadow-lg">
                        <HelpCircle className="w-4 h-4 text-[#39ff14]" /> How to Play
                      </button>
                      <button onClick={() => setShowSystem(true)} className="flex items-center gap-2 px-4 py-2 bg-neutral-900/80 border border-neutral-700 hover:bg-neutral-800 rounded-full text-xs md:text-sm font-bold text-white uppercase tracking-wider transition-colors shadow-lg">
                        <Settings className="w-4 h-4 text-neutral-400" /> Settings
                      </button>
                    </div>
                    <button onClick={startGame} disabled={assetStatus === "verifying"} className={`group w-full max-w-sm relative px-8 py-5 md:py-6 bg-[#39ff14] text-black font-black uppercase tracking-widest text-xl md:text-2xl rounded-full overflow-hidden transition-all shadow-[0_0_30px_rgba(57,255,20,0.5)] ${assetStatus !== "verifying" ? 'hover:scale-105 cursor-pointer mb-8' : 'opacity-80 cursor-not-allowed scale-95 mb-8'}`}>
                      <div className="absolute inset-0 bg-white/30 translate-y-full group-hover:translate-y-0 transition-transform" />
                      <span className="relative flex items-center justify-center gap-3">
                        {assetStatus === "verifying" ? <><Loader2 className="w-6 h-6 animate-spin" /> Loading HD Assets...</> : <><Play className="w-6 h-6 md:w-8 md:h-8 fill-black" /> Start Game</>}
                      </span>
                    </button>
                    <ScoreBoard scores={highScores} />
                  </div>

                  <div className="flex-1 w-full"></div>

                  <div className="w-full max-w-3xl grid grid-cols-1 md:grid-cols-2 gap-4 shrink-0 mt-4">
                    <div className="bg-black/80 border border-red-900/60 rounded-xl p-4 flex items-start gap-4 text-left shadow-lg">
                      <div className="bg-red-500/20 p-2 rounded-full shrink-0 mt-1"><ShieldAlert className="w-5 h-5 text-red-500" /></div>
                      <div>
                        <div className="text-red-500 font-bold uppercase text-[11px] md:text-xs tracking-widest mb-1">Age Restriction</div>
                        <div className="text-neutral-400 text-[10px] md:text-xs leading-snug">Energy drinks are formulated for adults. Not recommended for children, pregnant/nursing women, or individuals sensitive to caffeine.</div>
                      </div>
                    </div>
                    <div className="bg-black/80 border border-yellow-900/60 rounded-xl p-4 flex items-start gap-4 text-left shadow-lg">
                      <div className="bg-yellow-500/20 p-2 rounded-full shrink-0 mt-1"><Activity className="w-5 h-5 text-yellow-500" /></div>
                      <div>
                        <div className="text-yellow-500 font-bold uppercase text-[11px] md:text-xs tracking-widest mb-1">Photosensitivity</div>
                        <div className="text-neutral-400 text-[10px] md:text-xs leading-snug">This game contains fast-moving graphics. This may potentially trigger seizures for people with photosensitive epilepsy. Player discretion advised.</div>
                      </div>
                    </div>
                  </div>
                  
                  <div className="mt-6 text-[10px] md:text-xs text-neutral-500 uppercase tracking-[0.2em] font-black text-center w-full">Made by Mr Smith</div>
                </div>

                {showHelp && (
                  <div className="absolute inset-0 bg-black/95 z-[60] flex items-center justify-center p-4">
                    <div className="bg-neutral-900 border border-neutral-700 rounded-2xl p-6 w-full max-w-sm relative shadow-2xl">
                      <button onClick={() => setShowHelp(false)} className="absolute top-4 right-4 text-neutral-400 hover:text-white transition-colors"><X className="w-6 h-6" /></button>
                      <div className="flex items-center gap-2 text-[#39ff14] font-black mb-4 uppercase tracking-wider text-lg"><Flame className="w-6 h-6" /> How to Play</div>
                      <div className="space-y-4 text-neutral-300 text-sm font-mono leading-relaxed">
                        <p>Dodge TNT obstacles and collect HD Muscle Moose items to build your score.</p>
                        <div className="bg-black/50 p-4 rounded-lg border border-neutral-800">
                          <span className="text-[#39ff14] font-bold block mb-2 tracking-wider">STREAK MULTIPLIER:</span> Consecutive item pickups build your streak! Higher streaks = Massive Score Bonuses. Hitting TNT resets your streak.
                        </div>
                        <div className="bg-black/50 p-4 rounded-lg border border-neutral-800">
                          <span className="text-white font-bold block mb-2 tracking-wider">CONTROLS:</span>
                          <span className="text-[#39ff14]">PC:</span> ← → to move, UP to jump<br/>
                          <span className="text-[#39ff14] mt-1 inline-block">Mobile:</span> Swipe Left/Right/Up
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {gameState === "paused" && (
              <div className="absolute inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
                <div className="bg-neutral-900 border border-neutral-700 rounded-3xl p-8 w-full max-w-sm relative shadow-2xl flex flex-col items-center">
                  <div className="w-16 h-16 bg-neutral-800 rounded-full flex items-center justify-center mb-6 border border-neutral-700"><Pause className="w-8 h-8 text-white fill-white" /></div>
                  <h2 className="text-4xl font-black italic text-white uppercase mb-8 drop-shadow-lg">Game Paused</h2>
                  <div className="flex flex-col gap-4 w-full">
                    <button onClick={() => setGameState('playing')} className="group relative px-6 py-4 bg-[#39ff14] text-black font-black uppercase tracking-widest text-lg rounded-full overflow-hidden hover:scale-105 transition-transform shadow-[0_0_20px_rgba(57,255,20,0.4)] w-full">
                      <div className="absolute inset-0 bg-white/30 translate-y-full group-hover:translate-y-0 transition-transform" />
                      <span className="relative flex items-center justify-center gap-3"><Play className="w-5 h-5 fill-black" /> Resume Game</span>
                    </button>
                    <button onClick={() => setShowSystem(true)} className="group relative px-6 py-4 bg-neutral-800 text-white border border-neutral-700 font-black uppercase tracking-widest text-lg rounded-full overflow-hidden hover:bg-neutral-700 transition-colors w-full">
                      <span className="relative flex items-center justify-center gap-3"><Settings className="w-5 h-5" /> Settings</span>
                    </button>
                    <button onClick={() => {
                        if (isTrapActive.current) { isTrapActive.current = false; window.history.back(); }
                        setGameState('start');
                    }} className="group relative px-6 py-4 bg-neutral-800 text-white border border-neutral-700 font-black uppercase tracking-widest text-lg rounded-full overflow-hidden hover:bg-neutral-700 transition-colors w-full">
                      <span className="relative flex items-center justify-center gap-3"><Home className="w-5 h-5" /> Quit to Menu</span>
                    </button>
                  </div>
                </div>
              </div>
            )}

            {showSystem && (
              <div className="absolute inset-0 bg-black/95 z-[60] overflow-y-auto debug-scroll flex flex-col items-center py-10 px-4 pointer-events-auto">
                <div className="bg-neutral-900 border border-neutral-700 rounded-2xl p-6 w-full max-w-sm relative shadow-2xl flex flex-col items-center mt-auto mb-auto">
                  <button onClick={() => setShowSystem(false)} className="absolute top-4 right-4 text-neutral-400 hover:text-white transition-colors"><X className="w-6 h-6" /></button>
                  <div className="flex items-center gap-2 text-white font-black mb-6 uppercase tracking-wider text-lg w-full text-left"><Settings className="w-6 h-6 text-neutral-400" /> System Settings</div>

                  <div className="w-full bg-black/50 border border-neutral-800 rounded-xl p-4 flex flex-col items-center mb-4">
                    <div className="text-xs text-neutral-500 uppercase font-bold tracking-widest mb-3">Audio Options</div>
                    <button onClick={() => updateSetting('musicEnabled', !settings.musicEnabled)} className="w-full flex items-center justify-between px-4 py-3 bg-neutral-800 hover:bg-neutral-700 text-white border border-neutral-700 rounded-lg font-bold uppercase tracking-wider transition-colors text-sm mb-2">
                      <div className="flex items-center gap-2"><Music className="w-4 h-4 text-[#39ff14]" /> Dynamic Music</div>
                      <span className={settings.musicEnabled ? "text-[#39ff14]" : "text-neutral-500"}>{settings.musicEnabled ? 'On' : 'Off'}</span>
                    </button>
                    {settings.musicEnabled && (
                      <div className="w-full flex flex-col px-4 py-3 bg-neutral-800 border border-neutral-700 rounded-lg text-sm">
                        <div className="flex items-center justify-between mb-2">
                          <div className="flex items-center gap-2 text-white font-bold uppercase tracking-wider">
                            {settings.musicVolume > 0 ? <Volume2 className="w-4 h-4 text-[#39ff14]" /> : <VolumeX className="w-4 h-4 text-red-500" />}
                            Music Volume
                          </div>
                          <span className="text-[#39ff14] font-bold">{settings.musicVolume}%</span>
                        </div>
                        <input type="range" min="0" max="100" value={settings.musicVolume} onChange={(e) => updateSetting('musicVolume', parseInt(e.target.value))} className="w-full h-2 bg-neutral-900 rounded-lg appearance-none cursor-pointer accent-[#39ff14]" />
                      </div>
                    )}
                  </div>

                  <div className="w-full bg-black/50 border border-neutral-800 rounded-xl p-4 flex flex-col items-center mb-4">
                    <div className="text-xs text-neutral-500 uppercase font-bold tracking-widest mb-3">Gameplay Options</div>
                    
                    {/* Integrated Map Style Toggle */}
                    <button onClick={() => updateSetting('trackType', settings.trackType === 'classic' ? 'winding' : 'classic')} className="w-full flex items-center justify-between px-4 py-3 bg-neutral-800 hover:bg-neutral-700 text-white border border-neutral-700 rounded-lg font-bold uppercase tracking-wider transition-colors text-sm mb-2">
                      <div className="flex items-center gap-2"><Map className="w-4 h-4 text-[#39ff14]" /> Track Style</div>
                      <span className="text-[#39ff14]">{settings.trackType === 'classic' ? 'Classic' : 'Winding'}</span>
                    </button>

                    <button onClick={() => updateSetting('locomotion', settings.locomotion === 'run' ? 'hop' : 'run')} className="w-full flex items-center justify-between px-4 py-3 bg-neutral-800 hover:bg-neutral-700 text-white border border-neutral-700 rounded-lg font-bold uppercase tracking-wider transition-colors text-sm mb-2">
                      <div className="flex items-center gap-2"><Zap className="w-4 h-4 text-[#39ff14]" /> Gait Style</div>
                      <span className="text-[#39ff14]">{settings.locomotion === 'run' ? 'Running' : 'Bounding'}</span>
                    </button>
                    <button onClick={() => updateSetting('zoom', !settings.zoom)} className="w-full flex items-center justify-between px-4 py-3 bg-neutral-800 hover:bg-neutral-700 text-white border border-neutral-700 rounded-lg font-bold uppercase tracking-wider transition-colors text-sm mb-2">
                      <div className="flex items-center gap-2"><Camera className="w-4 h-4 text-[#39ff14]" /> Camera View</div>
                      <span className="text-[#39ff14]">{settings.zoom ? 'Zoomed' : 'Normal'}</span>
                    </button>
                    <button onClick={cycleSeason} className="w-full flex items-center justify-between px-4 py-3 bg-neutral-800 hover:bg-neutral-700 text-white border border-neutral-700 rounded-lg font-bold uppercase tracking-wider transition-colors text-sm">
                      <div className="flex items-center gap-2"><CloudRain className="w-4 h-4 text-[#39ff14]" /> Weather/Sky</div>
                      <span className="text-[#39ff14]">{envProps.name}</span>
                    </button>
                  </div>

                  <div className="w-full bg-black/50 border border-neutral-800 rounded-xl p-4 mb-4 flex flex-col items-center justify-center min-h-[100px]">
                    <div className="text-xs text-neutral-500 uppercase font-bold tracking-widest mb-3">Asset Engine Status</div>
                    {assetStatus === "verifying" && (<div className="flex items-center gap-2 text-yellow-400 font-bold bg-yellow-500/10 px-4 py-2 rounded-full border border-yellow-500/20"><Loader2 className="w-5 h-5 animate-spin" /> Compiling High-Poly Assets...</div>)}
                    {assetStatus === "partial" && (<div className="flex flex-col items-center gap-2 text-yellow-400 font-bold text-center"><div className="flex items-center gap-2"><AlertTriangle className="w-5 h-5" /> Proxies Blocked</div><span className="text-xs text-yellow-200 font-normal">Network blocked images. Playing with fallback colors.</span></div>)}
                    {assetStatus === "verified" && (<div className="flex items-center gap-2 text-green-400 font-bold bg-green-500/10 px-4 py-2 rounded-full border border-green-500/20"><CheckCircle2 className="w-5 h-5" /> All HD Assets Ready</div>)}
                  </div>

                  <div className="w-full bg-black/50 border border-neutral-800 rounded-xl p-4 flex flex-col items-center">
                    <div className="text-xs text-neutral-500 uppercase font-bold tracking-widest mb-3">Data & Developer Options</div>
                    <button onClick={() => {
                        if(window.confirm("Are you sure you want to clear your high scores?")) {
                            localStorage.removeItem('mm_highscores');
                            setHighScores([]);
                        }
                    }} className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-900/50 hover:bg-red-900/80 text-red-200 border border-red-800 rounded-lg font-bold uppercase tracking-wider transition-colors text-sm mb-2"><Trash2 className="w-4 h-4" /> Clear High Scores</button>
                    <button onClick={() => { setShowDebug(!showDebug); setShowSystem(false); }} className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-neutral-800 hover:bg-neutral-700 text-white border border-neutral-700 rounded-lg font-bold uppercase tracking-wider transition-colors text-sm"><Bug className="w-4 h-4 text-[#39ff14]" /> Open Debug Console</button>
                  </div>
                </div>
              </div>
            )}

            {gameState === "name_entry" && (
              <div className="absolute inset-0 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center p-4 md:p-8 pt-16 text-center z-20 overflow-y-auto debug-scroll pb-32 pointer-events-auto">
                <h2 className="text-5xl md:text-7xl font-black italic text-[#39ff14] uppercase mb-2 drop-shadow-[0_0_30px_rgba(57,255,20,0.6)] mt-8">High Score!</h2>
                <p className="text-neutral-300 text-xl md:text-2xl mb-8 uppercase tracking-widest font-bold">
                  SCORE: <span className="text-white">{Math.floor(stateRef.current.score).toLocaleString()}</span>
                </p>
                
                <div className="bg-neutral-900/90 border border-neutral-700 rounded-3xl p-6 md:p-10 mb-6 w-full max-w-sm shadow-2xl backdrop-blur-md flex flex-col items-center">
                  <p className="text-neutral-400 uppercase tracking-widest font-bold text-xs md:text-sm mb-6 flex items-center gap-2"><Trophy className="w-4 h-4"/> Enter Initials</p>
                  
                  <div className="flex gap-2 md:gap-4 mb-10">
                    {[0, 1, 2].map(idx => (
                      <div key={idx} className={`flex flex-col items-center transition-transform duration-200 cursor-pointer ${activeCharIdx === idx ? 'scale-110' : 'opacity-40 scale-95 hover:opacity-80'}`} onClick={() => setActiveCharIdx(idx)}>
                        <button onClick={(e) => { e.stopPropagation(); setNameChars(prev => { const n=[...prev]; n[idx] = (n[idx] - 1 + CHAR_SET.length) % CHAR_SET.length; return n; }); }} className="p-2 md:p-3 text-neutral-500 hover:text-white transition-colors bg-black/30 rounded-t-lg"><ChevronUp className="w-8 h-8 md:w-10 md:h-10"/></button>
                        <div className={`text-5xl md:text-6xl font-black font-mono w-16 h-20 md:w-20 md:h-24 flex items-center justify-center border-x border-black bg-black shadow-inner transition-colors ${activeCharIdx === idx ? 'text-[#39ff14] border-b-4 border-b-[#39ff14] shadow-[inset_0_0_20px_rgba(57,255,20,0.2)]' : 'text-white border-b-4 border-b-neutral-800'}`}>
                          {CHAR_SET[nameChars[idx]]}
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); setNameChars(prev => { const n=[...prev]; n[idx] = (n[idx] + 1 + CHAR_SET.length) % CHAR_SET.length; return n; }); }} className="p-2 md:p-3 text-neutral-500 hover:text-white transition-colors bg-black/30 rounded-b-lg"><ChevronDown className="w-8 h-8 md:w-10 md:h-10"/></button>
                      </div>
                    ))}
                  </div>
                  
                  <button id="save-score-btn" onClick={() => {
                      const finalScore = Math.floor(stateRef.current.score);
                      const initials = nameChars.map(idx => CHAR_SET[idx]).join("");
                      const newScores =[...highScores, { name: initials, score: finalScore }]
                                          .sort((a,b) => b.score - a.score)
                                          .slice(0, 5);
                      try { 
                          setHighScores(newScores); 
                          localStorage.setItem('mm_highscores', JSON.stringify(newScores)); 
                      } catch(e){}
                      setGameState("gameover");
                  }} className="group relative w-full px-6 py-4 bg-[#39ff14] text-black font-black uppercase tracking-widest text-lg md:text-xl rounded-full overflow-hidden hover:scale-105 transition-transform shadow-[0_0_20px_rgba(57,255,20,0.4)]">
                    <div className="absolute inset-0 bg-white/30 translate-y-full group-hover:translate-y-0 transition-transform" />
                    <span className="relative flex items-center justify-center gap-3">Save Score</span>
                  </button>
                </div>
              </div>
            )}

            {gameState === "gameover" && (
              <div className="absolute inset-0 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center p-4 md:p-8 pt-16 text-center z-20 overflow-y-auto debug-scroll pb-32 pointer-events-auto">
                <h2 className="text-5xl md:text-7xl font-black italic text-red-500 uppercase mb-2 drop-shadow-[0_0_30px_rgba(239,68,68,0.6)] mt-8">Energy Depleted</h2>
                <p className="text-neutral-300 text-xl md:text-2xl mb-6 uppercase tracking-widest font-bold">You crashed!</p>
                <div className="bg-neutral-900/80 border border-neutral-700 rounded-3xl p-6 md:p-8 mb-6 w-full max-w-sm shadow-2xl backdrop-blur-md">

                  <div className="text-5xl md:text-7xl font-black font-mono text-[#39ff14] drop-shadow-[0_0_15px_rgba(57,255,20,0.4)]">{Math.floor(stateRef.current.score).toLocaleString()}</div>
                </div>
                <ScoreBoard scores={highScores} />
                <div className="flex flex-col gap-4 w-full max-w-sm mb-8">
                  <button onClick={startGame} className="group relative px-8 py-4 bg-white text-black font-black uppercase tracking-widest text-xl rounded-full overflow-hidden hover:scale-105 transition-transform shadow-[0_0_20px_rgba(255,255,255,0.3)] w-full">
                    <div className="absolute inset-0 bg-[#39ff14] translate-y-full group-hover:translate-y-0 transition-transform" />
                    <span className="relative flex items-center justify-center gap-3"><RotateCcw className="w-6 h-6" /> Run Again</span>
                  </button>
                  <button onClick={() => {
                      if (isTrapActive.current) { isTrapActive.current = false; window.history.back(); }
                      setGameState('start');
                  }} className="group relative px-8 py-4 bg-neutral-900 border border-neutral-700 text-white font-black uppercase tracking-widest text-lg rounded-full overflow-hidden hover:bg-neutral-800 transition-colors w-full">
                    <span className="relative flex items-center justify-center gap-3"><Home className="w-5 h-5" /> Main Menu</span>
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
